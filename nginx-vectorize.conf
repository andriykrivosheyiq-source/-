# nginx-vectorize.conf
# NEW FILE — copy to /etc/nginx/conf.d/vectorize.conf
# Exposes vectorize_api.py (port 8001) via HTTPS on port 8443.
# After copying: sudo nginx -s reload && sudo ufw allow 8443/tcp

server {
    listen 8443 ssl;
    server_name embroider.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/embroider.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/embroider.duckdns.org/privkey.pem;

    location /api/vectorize {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
    }
}
