name = "sitniks-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace для URL shortener
# Як створити:
#   1. Cloudflare Dashboard → Workers & Pages → KV → Create namespace → назви "URLS"
#   2. Скопіюй ID і встав нижче (замість REPLACE_WITH_KV_NAMESPACE_ID)
#   3. wrangler deploy  (або вручну через Dashboard → Worker → Settings → KV Bindings)
[[kv_namespaces]]
binding = "URLS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
